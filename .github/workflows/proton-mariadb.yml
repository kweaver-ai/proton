name: proton-mariadb
on:
  workflow_dispatch:

jobs:
  cross:
    runs-on: ubuntu-24.04
    steps:
      -
        name: Checkout
        uses: actions/checkout@v6

      -
        name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      -
        name: Build
        uses: docker/bake-action@v7
        with:
          source: ./proton-mariadb