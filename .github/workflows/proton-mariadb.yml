name: proton-mariadb
on:
  workflow_dispatch:

jobs:
  cross:
    runs-on: ubuntu-24.04
    environment: swr
    steps:
      -
        name: Login to SWR Docker Hub
        uses: docker/login-action@v4
        with:
          registry: ${{ vars.OCI_REGISTRY }}
          username: ${{ vars.OCI_USERNAME }}
          password: ${{ secrets.OCI_TOKEN }}

      -
        name: Checkout
        uses: actions/checkout@v6

      - 
        name: Get Version
        id: version
        run: |
          if [[ $GITHUB_REF == refs/tags/proton-mariadb/v* ]]; then
            VERSION=${GITHUB_REF#refs/tags/proton-mariadb/v}
            TAG=$VERSION
            echo "🚀 Release version: $VERSION"
          else
            SHORT_SHA=${GITHUB_SHA:0:7}
            VERSION="0.0.0-snapshot+${SHORT_SHA}"
            TAG="snapshot-${SHORT_SHA}"
            echo "🔧 Snapshot version: $VERSION"
          fi
          
          # 输出给后续 job 使用
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=$TAG" >> $GITHUB_OUTPUT

      -
        name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      -
        name: Build
        uses: docker/bake-action@v7
        with:
          source: ./proton-mariadb
          push: true
          provenance: false
        env:
          REPOSITORY_BASE: ${{ vars.OCI_BASEREPO }}
          REGISTRY: ${{ vars.OCI_REGISTRY }}
          VERSION: ${{ steps.version.outputs.version }}
          TAG: ${{ steps.version.outputs.tag }}

      - name: Push Helm chart to OCI compatible registry (Github)
        uses: bsord/helm-push@4.2.0
        with:
          useOCIRegistry: true
          registry-url: oci://ghcr.io/kweaver-ai/charts
          username: ${{ vars.GHCR_USERNAME }}
          access-token: ${{ secrets.GHCR_TOKEN }}
          force: true
          chart-folder: ./proton-mariadb/.buildx/charts
