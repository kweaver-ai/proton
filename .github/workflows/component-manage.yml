name: component-manage

on:
  workflow_dispatch:
  push:
    tags:
      - 'component-manage/v*'

jobs:
  prepare:
    runs-on: ubuntu-24.04
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
      targets: ${{ steps.targets.outputs.targets }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Get Version
        id: version
        run: |
          if [[ $GITHUB_REF == refs/tags/component-manage/v* ]]; then
            VERSION=${GITHUB_REF#refs/tags/component-manage/v}
            TAG=$VERSION
            echo "🚀 Release version: $VERSION"
          else
            SHORT_SHA=${GITHUB_SHA:0:7}
            VERSION="0.0.0-snapshot.${SHORT_SHA}"
            TAG="snapshot.${SHORT_SHA}"
            echo "🔧 Snapshot version: $VERSION"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=$TAG" >> $GITHUB_OUTPUT

      - name: Resolve bake targets
        id: targets
        run: |
          # 列出所有需要构建多平台镜像的 target（排除 chart 等非镜像 target）
          TARGETS='["cm-image"]'
          echo "targets=$TARGETS" >> $GITHUB_OUTPUT

  build:
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        target: ${{ fromJson(needs.prepare.outputs.targets) }}
        platform:
          - linux/amd64
          - linux/arm64
        include:
          - platform: linux/amd64
            runner: ubuntu-24.04
            platform_suffix: amd64
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
            platform_suffix: arm64
    runs-on: ${{ matrix.runner }}
    environment: swr
    steps:
      - name: Login to SWR Docker Hub
        uses: docker/login-action@v4
        with:
          registry: ${{ vars.OCI_REGISTRY }}
          username: ${{ vars.OCI_USERNAME }}
          password: ${{ secrets.OCI_TOKEN }}

      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push (${{ matrix.target }} / ${{ matrix.platform }})
        uses: docker/bake-action@v7
        with:
          source: ./component-manage
          targets: ${{ matrix.target }}
          push: true
          provenance: false
          set: |
            *.platform=${{ matrix.platform }}
        env:
          REPOSITORY_BASE: ${{ vars.OCI_BASEREPO }}
          REGISTRY: ${{ vars.OCI_REGISTRY }}
          VERSION: ${{ needs.prepare.outputs.version }}
          TAG: ${{ needs.prepare.outputs.tag }}-${{ matrix.platform_suffix }}

  manifest:
    needs: [prepare, build]
    runs-on: ubuntu-24.04
    environment: swr
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: cm-image
            image: component-manage
    steps:
      - name: Login to SWR Docker Hub
        uses: docker/login-action@v4
        with:
          registry: ${{ vars.OCI_REGISTRY }}
          username: ${{ vars.OCI_USERNAME }}
          password: ${{ secrets.OCI_TOKEN }}

      - name: Create and push manifest (${{ matrix.image }})
        run: |
          TAG="${{ needs.prepare.outputs.tag }}"
          IMAGE="${{ vars.OCI_REGISTRY }}/${{ vars.OCI_BASEREPO }}/${{ matrix.image }}"

          docker manifest create "${IMAGE}:${TAG}" "${IMAGE}:${TAG}-amd64" "${IMAGE}:${TAG}-arm64"
          docker manifest annotate "${IMAGE}:${TAG}" "${IMAGE}:${TAG}-amd64" --os linux --arch amd64
          docker manifest annotate "${IMAGE}:${TAG}" "${IMAGE}:${TAG}-arm64" --os linux --arch arm64
          docker manifest push "${IMAGE}:${TAG}"

  chart:
    needs: [prepare, manifest]
    runs-on: ubuntu-24.04
    environment: swr
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build Helm Chart
        uses: docker/bake-action@v7
        with:
          source: ./component-manage
          targets: cm-chart
          provenance: false
        env:
          REPOSITORY_BASE: ${{ vars.OCI_BASEREPO }}
          REGISTRY: ${{ vars.OCI_REGISTRY }}
          VERSION: ${{ needs.prepare.outputs.version }}
          TAG: ${{ needs.prepare.outputs.tag }}

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Push Helm Chart
        run: |
          echo ${{ secrets.GHCR_TOKEN }} | helm registry login ghcr.io -u pat --password-stdin
          helm push ./component-manage/.buildx/charts/* oci://ghcr.io/kweaver-ai/charts
