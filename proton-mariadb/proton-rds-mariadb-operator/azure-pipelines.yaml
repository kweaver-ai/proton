# Go
# Build your Go project.
# Add steps that test, save build artifacts, deploy, and more:
# https://docs.microsoft.com/azure/devops/pipelines/languages/go

trigger:
  - main

resources:
  containers:
    - container: builder
      image: acr.aishu.cn/ict/proton/sophon/build-image:20220617

variables:
  - name: CONTROLLER_VERSION
    value: '1.4.1'
  - name: CONTROLLER_IMAGE_REGISTRY
    value: acr.aishu.cn
  - name: CONTROLLER_IMAGE_REPOSITORY
    value: proton/rds-mariadb-controller
  - name: TAG

stages:
  - stage: Build
    pool: proton-slave-x86_64
    jobs:
      - job: Chart
        container: builder
        steps:
          - task: Docker@2
            displayName: Login acr.aishu.cn
            inputs:
              command: login
              containerRegistry: ProtonACR
          - bash: |
              if [[ $(Build.SourceBranchName) =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]];then
                if [[ $(Build.SourceBranchName) != ${CONTROLLER_VERSION} ]]; then
                  exit 1
                fi
                echo "##vso[task.setvariable variable=TAG]$(Build.SourceBranchName)"
              else
                echo "##vso[task.setvariable variable=TAG]${CONTROLLER_VERSION}-$(Build.SourceBranchName)"
              fi
            displayName: Set Tag
          - bash: |
              sed -i 's/tag: VERSION/tag: $(TAG)/' chart/rds-mariadb-operator/values.yaml
              sed -i 's/^version.*/version: $(TAG)/' chart/rds-mariadb-operator/Chart.yaml
              sed -i 's/^appVersion.*/appVersion: $(Build.SourceVersion)/' chart/rds-mariadb-operator/Chart.yaml
              CREDENTIALS=$(jq -r '.auths."https://acr.aishu.cn".auth' ${DOCKER_CONFIG}/config.json)
              cd chart
              helm package rds-mariadb-operator --version=$(TAG)
              ls
              curl -X POST -fvL \
                -H "Authorization: Basic ${CREDENTIALS}" \
                -H "Content-Type: multipart/form-data" \
                -F "chart=@rds-mariadb-operator-$(TAG).tgz;type=type=application/x-compressed-tar" \
                https://acr.aishu.cn/api/chartrepo/proton/charts
            displayName: Create And Push Chart
      - job: ContainerImageAMD64
        container: builder
        steps:
          - bash: |
              if [[ $(Build.SourceBranchName) =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]];then
                if [[ $(Build.SourceBranchName) != ${CONTROLLER_VERSION} ]]; then
                  exit 1
                fi
                echo "##vso[task.setvariable variable=TAG]$(Build.SourceBranchName)"
              else
                echo "##vso[task.setvariable variable=TAG]${CONTROLLER_VERSION}-$(Build.SourceBranchName)"
              fi
            displayName: Set Tag
          - task: Docker@2
            displayName: Build
            inputs:
              command: build
              arguments: --build-arg ARCH=amd64
              containerRegistry: ProtonACR
              repository: proton/rds-mariadb-controller-amd64
              Dockerfile: Dockerfile.proton
              tags: |
                $(TAG)
          - task: Docker@2
            displayName: Push
            inputs:
              command: push
              containerRegistry: ProtonACR
              repository: proton/rds-mariadb-controller-amd64
              tags: |
                 $(TAG)
      - job: ContainerImageARM64
        pool: proton-slave-arm64
        container: builder
        steps:
          - bash: |
              if [[ $(Build.SourceBranchName) =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]];then
                if [[ $(Build.SourceBranchName) != ${CONTROLLER_VERSION} ]]; then
                  exit 1
                fi
                echo "##vso[task.setvariable variable=TAG]$(Build.SourceBranchName)"
              else
                echo "##vso[task.setvariable variable=TAG]${CONTROLLER_VERSION}-$(Build.SourceBranchName)"
              fi
            displayName: Set Tag
          - task: Docker@2
            displayName: Build
            inputs:
              command: build
              arguments: --build-arg ARCH=arm64
              containerRegistry: ProtonACR
              repository: proton/rds-mariadb-controller-arm64
              Dockerfile: Dockerfile.proton
              tags: |
                $(TAG)
          - task: Docker@2
            displayName: Push
            inputs:
              command: push
              containerRegistry: ProtonACR
              repository: proton/rds-mariadb-controller-arm64
              tags: |
                $(TAG)
      - job: Manifest
        container: builder
        dependsOn:
          - ContainerImageAMD64
          - ContainerImageARM64
        steps:
          - bash: |
              if [[ $(Build.SourceBranchName) =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]];then
                if [[ $(Build.SourceBranchName) != ${CONTROLLER_VERSION} ]]; then
                  exit 1
                fi
                echo "##vso[task.setvariable variable=TAG]$(Build.SourceBranchName)"
              else
                echo "##vso[task.setvariable variable=TAG]${CONTROLLER_VERSION}-$(Build.SourceBranchName)"
              fi
            displayName: Set Tag
          - task: Docker@2
            displayName: Login acr.aishu.cn
            inputs:
              command: login
              containerRegistry: ProtonACR
          - bash: |
              docker manifest create ${CONTROLLER_IMAGE_REGISTRY}/${CONTROLLER_IMAGE_REPOSITORY}:$(TAG) ${CONTROLLER_IMAGE_REGISTRY}/${CONTROLLER_IMAGE_REPOSITORY}-amd64:$(TAG) ${CONTROLLER_IMAGE_REGISTRY}/${CONTROLLER_IMAGE_REPOSITORY}-arm64:$(TAG)
              docker manifest push -p ${CONTROLLER_IMAGE_REGISTRY}/${CONTROLLER_IMAGE_REPOSITORY}:$(TAG)
            displayName: Create manifest
