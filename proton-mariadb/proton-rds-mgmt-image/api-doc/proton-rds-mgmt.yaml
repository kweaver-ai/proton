components:
  schemas:
    FailRESP:
      description: ""
      required:
      - code
      - message
      - cause
      type: object
      properties:
        code:
          format: int64
          description: 业务错误码
          type: integer
        message:
          description: 业务错误信息
          type: string
        cause:
          description: 导致此错误的原因
          type: string
        detail:
          description: 错误辅助信息
          type: string
      example:
        code: 50
        message: some text
        cause: some text
        detail: some text
    PrivItem:
      description: 权限信息
      required:
      - db_name
      - privilege_type
      type: object
      properties:
        privilege_type:
          description: 权限类型，ReadWrite、ReadOnly、DDLOnly、DMLOnly、All、None
          enum:
          - ReadWrite
          - ReadOnly
          - DDLOnly
          - DMLOnly
          - None
          - All
          type: string
        db_name:
          description: 需要授权访问的数据库
          type: string
      example:
        dbname: test1
        privilege_type: ReadOnly
    DBItem:
      description: ""
      required:
      - charset
      - collate
      - db_name
      type: object
      properties:
        charset:
          description: 数据库字符集编码
          type: string
        collate:
          description: 数据库排序规则
          type: string
        db_name:
          description: 数据库名
          type: string
      example:
        dbname: ecms
        charset: utf8mb4
        collate: utf8mb4_general_ci
    DBInfo:
      description: ""
      required:
      - charset
      type: object
      properties:
        charset:
          description: "数据库字符集编码,详见https://mariadb.com/kb/en/supported-character-sets-and-collations/"
          type: string
        collate:
          description: 数据库排序规则，详见https://mariadb.com/kb/en/supported-character-sets-and-collations/
          type: string
      example:
        charset: utf8mb4
        collate: utf8mb4_general_ci
    UserItem:
      description: 数据库账户信息
      required:
      - privileges
      - username
      - ssl_type
      type: object
      properties:
        privileges:
          description: 权限
          type: array
          items:
            $ref: '#/components/schemas/PrivItem'
        username:
          description: 用户名
          type: string
        ssl_type:
          description: user ssl设置
          enum:
          - Any
          - None
          type: string
      example:
        username: test
        privileges:
        - dbname: db1
          privilege_type: ReadWrite
        - dbname: db2
          privilege_type: ReadOnly
    PasswordInfo:
      description: 密码
      required:
      - password
      type: object
      properties:
        password:
          description: |-
            密码内容必须包含以下三种及以上字符类型：大写字母、小写字母、数字、特殊符号。长度为8～32位。
            特殊字符包括：叹号 !、电子邮件符号 @、井号 #、美元符 $、百分号 %、 脱字符 ^、和号 &、星号 *、左括号 (、右括号 )、下划线 _、加号 +、减号 -、等号 =、句号 .
            密码字符串base64编码。如已配置加密，则对原始密码加密后再进行base64编码
          type: string
      example:
        password: xxxxxx
    ExtendPrivItem:
      description: 权限信息
      required:
      - db_name
      - privilege_type
      type: object
      properties:
        privilege_type:
          description: 权限类型，ReadWrite、ReadOnly、DDLOnly、DMLOnly、All、None
          enum:
          - ReadWrite
          - ReadOnly
          - DDLOnly
          - DMLOnly
          - None
          - All
          type: string
        db_name:
          description: 需要授权访问的数据库
          type: string
      example:
        dbname: test1
        privilege_type: ReadOnly
    BackupInfo:
      description: 备份包信息
      required:
      - package_name
      - id
      - create_time
      - status
      - storage_node
      type: object
      properties:
        id:
          description: 包id，唯一标识
          type: string
        status:
          description: 备份包状态
          enum:
          - failed
          - success
          - running
          type: string
        create_time:
          description: 备份时间
          type: string
        storage_node:
          description: 备份包节点
          type: string
        package_name:
          description: 包名
          type: string
    SslItem:
      description: ""
      required:
      - ssl_type
      type: object
      properties:
        ssl_type:
          description: ""
          enum:
          - Any
          - None
          type: string
  securitySchemes:
    OAuth2.0:
      flows: {}
      type: oauth2
tags:
- name: DataBase
  description: 数据库管理
- name: UserAccount
  description: 用户账户相关管理
- name: Backup
  description: 备份管理
- name: cluster
  description: ""
