---
openapi: 3.0.2
info:
  title: proton-rds-mgmt
  version: 1.9.0
  description: Proton RDS Management API
servers:
- url: "http://{host}:{port}"
  description: api server url
  variables:
    host:
      default: 127.0.0.1
      description: api服务所在host。
    port:
      default: "8888"
      description: api服务监听的端口
paths:
  /api/proton-rds-mgmt/v2/dbs:
    summary: 数据库查询
    description: 用于获取数据库列表
    get:
      tags:
      - DataBase
      responses:
        "200":
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/DBItem'
              examples:
                DBItems:
                  value:
                  - db_name: test1
                    charset: utf8mb4
                    collate: utf8mb4_general_ci
                  - db_name: test2
                    charset: utf8mb4
                    collate: utf8mb4_general_ci
          description: 查询成功
        "401":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FailRESP'
              examples:
                未授权:
                  value:
                    code: 401020000
                    message: Unauthorized
                    cause: Failed to verify Token
          description: 未授权
        "403":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FailRESP'
              examples:
                禁止执行:
                  value:
                    code: 403020000
                    message: 禁止执行
                    cause: 无相关权限
          description: 请求禁止执行
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FailRESP'
              examples:
                内部异常:
                  value:
                    code: 500020000
                    message: 内部错误
                    cause: xxx Exception...
          description: 内部错误
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FailRESP'
              examples:
                e1:
                  value:
                    code: 400020000
                    message: 参数错误
                    cause: 请求参数不合法
          description: 参数错误
      security:
      - OAuth2.0: []
      summary: 查询
      description: 获取所有的db
    parameters:
    - examples:
        root:fakepassword:
          value: cm9vdDpmYWtlcGFzc3dvcmQ=
      name: admin-key
      description: 对管理员用户名+密码字符串(用户名:密码)进行base64编码。 如已配置加密，则对原始密码加密后(用户名:加密密码)再进行base64编码
      schema:
        type: string
      in: header
      required: true
  /api/proton-rds-mgmt/v2/users:
    summary: 用户账户查询
    description: 用于获取用户账户列表
    get:
      tags:
      - UserAccount
      responses:
        "200":
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/UserItem'
              examples:
                users:
                  value:
                  - privileges:
                    - privilege_type: ReadOnly
                      db_name: some text
                    - privilege_type: ReadWrite
                      db_name: some text
                    username: some text
                    ssl_type: Any
                  - privileges:
                    - privilege_type: ReadOnly
                      db_name: some text
                    - privilege_type: ReadWrite
                      db_name: some text
                    username: some text
                    ssl_type: Any
          description: 查询成功
        "401":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FailRESP'
              examples:
                未授权:
                  value:
                    code: 401020000
                    message: Unauthorized
                    cause: Failed to verify Token
          description: 未授权
        "403":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FailRESP'
              examples:
                禁止执行:
                  value:
                    code: 403020000
                    message: 禁止执行
                    cause: 无相关权限
          description: 请求禁止执行
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FailRESP'
              examples:
                内部异常:
                  value:
                    code: 500020000
                    message: 内部错误
                    cause: xxx Exception...
          description: 内部错误
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FailRESP'
              examples:
                e1:
                  value:
                    code: 400020000
                    message: 参数错误
                    cause: 请求参数不合法
          description: 参数错误
      security:
      - OAuth2.0: []
      summary: 查询
      description: 获取所有的user
    parameters:
    - examples:
        root:fakepassword:
          value: cm9vdDpmYWtlcGFzc3dvcmQ=
      name: admin-key
      description: 对管理员用户名+密码字符串(用户名:密码)进行base64编码。 如已配置加密，则对原始密码加密后(用户名:加密密码)再进行base64编码
      schema:
        type: string
      in: header
      required: true
  /api/proton-rds-mgmt/v2/dbs/{db_name}:
    summary: 数据库管理
    description: 用于数据库的创建和删除
    put:
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DBInfo'
            examples:
              DBInfo:
                value:
                  charset: utf8mb4
                  collate: utf8mb4_general_ci
        required: true
      tags:
      - DataBase
      responses:
        "201":
          description: 创建成功
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FailRESP'
              examples:
                参数错误:
                  value:
                    code: 400020000
                    message: 参数错误
                    cause: 请求参数不合法
          description: 非法请求
        "401":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FailRESP'
              examples:
                未授权:
                  value:
                    code: 401020000
                    message: Unauthorized
                    cause: Failed to verify Token
          description: 未授权
        "403":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FailRESP'
              examples:
                禁止执行:
                  value:
                    code: 403020000
                    message: 禁止执行
                    cause: 数据库已存在无法重复创建
          description: 请求禁止执行
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FailRESP'
              examples:
                内部异常:
                  value:
                    code: 500020000
                    message: 内部错误
                    cause: xxx Exception...
          description: 内部错误
      summary: 创建
      description: 创建数据库
    delete:
      tags:
      - DataBase
      responses:
        "204":
          description: 删除成功，无返回内容
        "401":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FailRESP'
              examples:
                未授权:
                  value:
                    code: 401020000
                    message: Unauthorized
                    cause: Failed to verify Token
          description: 未授权
        "403":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FailRESP'
              examples:
                禁止执行:
                  value:
                    code: 403020000
                    message: 禁止执行
                    cause: 系统数据库不允许删除
          description: 该请求禁止执行
        "404":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FailRESP'
              examples:
                资源不存在:
                  value:
                    code: 404020000
                    message: 资源不存在
                    cause: 待删除的数据库不存在
          description: 删除的资源不存在
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FailRESP'
              examples:
                内部错误:
                  value:
                    code: 500020000
                    message: 内部错误
                    cause: xxx Exception...
          description: 内部错误
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FailRESP'
              examples:
                e1:
                  value:
                    code: 400020000
                    message: 参数错误
                    cause: 请求参数不合法
          description: 参数错误
      security:
      - OAuth2.0: []
      summary: 删除
      description: 删除数据库
    parameters:
    - examples:
        root:fakepassword:
          value: cm9vdDpmYWtlcGFzc3dvcmQ=
      name: admin-key
      description: 对管理员用户名+密码字符串(用户名:密码)进行base64编码。 如已配置加密，则对原始密码加密后(用户名:加密密码)再进行base64编码
      schema:
        type: string
      in: header
      required: true
    - examples:
        test1库:
          value: test1
      name: db_name
      description: "数据库名, 由小写字母、数字、下划线（_）组成，以字母开头，字母或数字结尾，最多64个字符"
      schema:
        type: string
      in: path
      required: true
